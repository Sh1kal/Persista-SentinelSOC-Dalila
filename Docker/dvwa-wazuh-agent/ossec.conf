<ossec_config>
  <client>
    <server>
      <address>CHANGE_MANAGER_IP</address>
      <port>CHANGE_MANAGER_PORT</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>dvwa</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
    <enrollment>
      <enabled>yes</enabled>
      <manager_address>CHANGE_ENROLL_IP</manager_address>
      <port>CHANGE_ENROLL_PORT</port>
      <agent_name>CHANGE_AGENT_NAME</agent_name>
      <groups>CHANGE_AGENT_GROUP</groups>
    </enrollment>
  </client>

  <localfile>
    <location>/var/log/apache2/access.log</location>
    <log_format>apache</log_format>
  </localfile>

  <localfile>
    <location>/var/log/apache2/error.log</location>
    <log_format>apache</log_format>
  </localfile>

  <localfile>
    <location>/var/log/dvwa/auth.log</location>
    <log_format>json</log_format>
  </localfile>

  <localfile>
    <location>/var/ossec/logs/active-responses.log</location>
    <log_format>syslog</log_format>
  </localfile>

  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <directories realtime="yes" check_all="yes">/sentinelsoc/yara-drop</directories>
  </syscheck>
</ossec_config>
